<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }
  header { background: #e67e22; color: white; padding: 18px 30px; }
  header h1 { font-size: 1.5rem; }
  .container { max-width: 1000px; margin: 30px auto; padding: 0 16px; display: flex; gap: 24px; flex-wrap: wrap; }
  .products { flex: 1 1 560px; }
  .cart-section { flex: 1 1 300px; }
  h2 { font-size: 1rem; color: #444; margin-bottom: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
  .product-card { background: white; border-radius: 10px; padding: 16px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
  .product-card img { font-size: 2.5rem; display: block; margin: 0 auto 10px; }
  .product-card .name { font-weight: 600; margin-bottom: 4px; font-size: 0.95rem; }
  .product-card .price { color: #e67e22; font-size: 1rem; font-weight: bold; margin-bottom: 12px; }
  .product-card button { width: 100%; padding: 8px; background: #e67e22; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
  .product-card button:hover { background: #d35400; }
  .cart-box { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
  .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
  .cart-item .item-name { flex: 1; }
  .cart-item .item-price { color: #e67e22; font-weight: 600; margin: 0 12px; }
  .remove-btn { background: #c0392b; color: white; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 0.8rem; }
  .remove-btn:hover { background: #e74c3c; }
  .total { margin-top: 16px; font-size: 1.1rem; font-weight: 700; text-align: right; color: #1a1a1a; }
  .empty-msg { text-align: center; color: #aaa; padding: 20px 0; font-size: 0.9rem; }
  .emoji { font-size: 2.4rem; }
</style>
</head>
<body>
<header><h1>🛒 ShopEasy — Dynamic Cart</h1></header>
<div class="container">

  <!-- PRODUCTS -->
  <div class="products">
    <h2>Products</h2>
    <div class="product-grid" id="productGrid"></div>
  </div>

  <!-- CART -->
  <div class="cart-section">
    <h2>🧾 Your Cart</h2>
    <div class="cart-box">
      <div id="cartItems"><p class="empty-msg">Your cart is empty.</p></div>
      <div class="total" id="totalDisplay">Total: ₦0.00</div>
    </div>
  </div>

</div>

<script>
// ── PRODUCTS DATA ──────────────────────────────────────
const products = [
  { id: 1, name: "Wireless Earbuds",  price: 12500, emoji: "🎧" },
  { id: 2, name: "Laptop Stand",      price:  8700, emoji: "💻" },
  { id: 3, name: "USB-C Hub",         price:  6200, emoji: "🔌" },
  { id: 4, name: "Mechanical Keyboard", price: 21000, emoji: "⌨️" },
  { id: 5, name: "Webcam HD",         price: 15900, emoji: "📷" },
  { id: 6, name: "Mouse Pad XL",      price:  3400, emoji: "🖱️" },
];

// cart is an array of { id, name, price }
let cart = [];

// ── RENDER PRODUCTS ─────────────────────────────────────
function renderProducts() {
  const grid = document.getElementById("productGrid");
  grid.innerHTML = products.map(p => `
    <div class="product-card">
      <span class="emoji">${p.emoji}</span>
      <div class="name">${p.name}</div>
      <div class="price">₦${p.price.toLocaleString()}</div>
      <button onclick="addToCart(${p.id})">Add to Cart</button>
    </div>
  `).join('');
}

// ── ADD TO CART ─────────────────────────────────────────
function addToCart(productId) {
  const product = products.find(p => p.id === productId);
  cart.push({ id: Date.now(), name: product.name, price: product.price });
  renderCart();
}

// ── REMOVE FROM CART ────────────────────────────────────
function removeFromCart(cartItemId) {
  cart = cart.filter(item => item.id !== cartItemId);
  renderCart();
}

// ── RENDER CART ─────────────────────────────────────────
function renderCart() {
  const container = document.getElementById("cartItems");
  const totalEl   = document.getElementById("totalDisplay");

  if (cart.length === 0) {
    container.innerHTML = '<p class="empty-msg">Your cart is empty.</p>';
    totalEl.textContent = "Total: ₦0.00";
    return;
  }

  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <span class="item-name">${item.name}</span>
      <span class="item-price">₦${item.price.toLocaleString()}</span>
      <button class="remove-btn" onclick="removeFromCart(${item.id})">Remove</button>
    </div>
  `).join('');

  // Calculate running total
  const total = cart.reduce((sum, item) => sum + item.price, 0);
  totalEl.textContent = `Total: ₦${total.toLocaleString()}`;
}

// ── INIT ────────────────────────────────────────────────
renderProducts();
renderCart();
</script>
</body>
</html>
