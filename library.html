<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Library Management System</title> <style> * { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #222; } header { background: #1a3c5e; color: white; padding: 20px 30px; } header h1 { font-size: 1.6rem; } .container { max-width: 900px; margin: 30px auto; padding: 0 20px; } .card { background: white; border-radius: 10px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); } h2 { color: #1a3c5e; margin-bottom: 16px; font-size: 1.1rem; } input, select { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 10px; font-size: 0.95rem; } button { padding: 10px 20px; background: #1a3c5e; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; margin-right: 8px; } button:hover { background: #2a5c8e; } .btn-danger { background: #c0392b; } .btn-danger:hover { background: #e74c3c; } .btn-success { background: #27ae60; } .btn-success:hover { background: #2ecc71; } table { width: 100%; border-collapse: collapse; font-size: 0.9rem; } th { background: #1a3c5e; color: white; padding: 10px; text-align: left; } td { padding: 10px; border-bottom: 1px solid #eee; } tr:hover td { background: #f7f9fc; } .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: bold; } .available { background: #d4edda; color: #155724; } .unavailable { background: #f8d7da; color: #721c24; } .msg { padding: 10px 14px; border-radius: 6px; margin-top: 10px; font-size: 0.9rem; display: none; } .msg.success { background: #d4edda; color: #155724; display: block; } .msg.error { background: #f8d7da; color: #721c24; display: block; } </style> </head> <body> <header><h1>📚 Library Management System</h1></header> <div class="container"> <!-- ADD BOOK --> <div class="card"> <h2>➕ Add a New Book</h2> <input id="bookTitle" type="text" placeholder="Book Title"> <input id="bookAuthor" type="text" placeholder="Author Name"> <input id="bookYear" type="number" placeholder="Year Published"> <button onclick="addBook()">Add Book</button> <div id="addMsg" class="msg"></div> </div> <!-- BORROW / RETURN --> <div class="card"> <h2>🔄 Borrow or Return a Book</h2> <input id="searchTitle" type="text" placeholder="Enter exact book title"> <button onclick="borrowBook()">Borrow Book</button> <button class="btn-success" onclick="returnBook()">Return Book</button> <div id="actionMsg" class="msg"></div> </div> <!-- AVAILABLE BOOKS --> <div class="card"> <h2>📖 All Books in Library</h2> <button onclick="showAvailable()" style="margin-bottom:14px;">Show Only Available</button> <button onclick="renderTable(library.books)" style="margin-bottom:14px;">Show All</button> <table> <thead><tr><th>Title</th><th>Author</th><th>Year</th><th>Status</th></tr></thead> <tbody id="bookTable"></tbody> </table> </div> </div> <script> // ── BOOK CLASS ────────────────────────────────────────── class Book { constructor(title, author, year) { this.title = title; this.author = author; this.year = year; this.available = true; // starts as available } } // ── LIBRARY CLASS ─────────────────────────────────────── class Library { constructor() { this.books = []; } addBook(book) { this.books.push(book); } borrowBook(title) { const book = this.findBook(title); if (!book) return "❌ Book not found."; if (!book.available) return "⚠️ Book is already borrowed."; book.available = false; return `✅ You borrowed "${book.title}" successfully.`; } returnBook(title) { const book = this.findBook(title); if (!book) return "❌ Book not found."; if (book.available) return "⚠️ This book wasn't borrowed."; book.available = true; return `✅ "${book.title}" has been returned. Thank you!`; } listAvailable() { return this.books.filter(b => b.available); } findBook(title) { return this.books.find(b => b.title.toLowerCase() === title.toLowerCase()); } } // ── INITIALISE WITH SAMPLE BOOKS ─────────────────────── const library = new Library(); library.addBook(new Book("Things Fall Apart", "Chinua Achebe", 1958)); library.addBook(new Book("Purple Hibiscus", "Chimamanda Adichie", 2003)); library.addBook(new Book("Half of a Yellow Sun", "Chimamanda Adichie", 2006)); library.addBook(new Book("The In-Between World", "Sefi Atta", 2004)); library.addBook(new Book("Season of Anomy", "Wole Soyinka", 1973)); renderTable(library.books); // ── UI HELPERS ────────────────────────────────────────── function renderTable(books) { const tbody = document.getElementById("bookTable"); if (books.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#888">No books found.</td></tr>'; return; } tbody.innerHTML = books.map(b => ` <tr> <td>${b.title}</td> <td>${b.author}</td> <td>${b.year}</td> <td><span class="badge ${b.available ? 'available' : 'unavailable'}"> ${b.available ? 'Available' : 'Borrowed'} </span></td> </tr>`).join(''); } function showMsg(id, text, type) { const el = document.getElementById(id); el.className = `msg ${type}`; el.textContent = text; setTimeout(() => el.className = 'msg', 3500); } function addBook() { const t = document.getElementById("bookTitle").value.trim(); const a = document.getElementById("bookAuthor").value.trim(); const y = document.getElementById("bookYear").value.trim(); if (!t || !a || !y) { showMsg("addMsg","Please fill in all fields.","error"); return; } library.addBook(new Book(t, a, parseInt(y))); document.getElementById("bookTitle").value = ""; document.getElementById("bookAuthor").value = ""; document.getElementById("bookYear").value = ""; showMsg("addMsg", `"${t}" added to library!`, "success"); renderTable(library.books); } function borrowBook() { const title = document.getElementById("searchTitle").value.trim(); const result = library.borrowBook(title); showMsg("actionMsg", result, result.startsWith("✅") ? "success" : "error"); renderTable(library.books); } function returnBook() { const title = document.getElementById("searchTitle").value.trim(); const result = library.returnBook(title); showMsg("actionMsg", result, result.startsWith("✅") ? "success" : "error"); renderTable(library.books); } function showAvailable() { renderTable(library.listAvailable()); } </script> </body> </html>
