<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Results</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #222; padding: 30px 16px; }
  h1 { text-align: center; color: #1a3c5e; margin-bottom: 8px; }
  p.sub { text-align: center; color: #666; margin-bottom: 28px; font-size: 0.9rem; }
  .table-wrap { max-width: 700px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #1a3c5e; color: white; }
  th, td { padding: 13px 18px; text-align: left; font-size: 0.93rem; }
  tbody tr:nth-child(even) { background: #f7f9fc; }
  tbody tr:hover { background: #eef2f7; }
  .pass { color: #155724; background: #d4edda; padding: 3px 12px; border-radius: 20px; font-weight: 600; font-size: 0.82rem; }
  .fail { color: #721c24; background: #f8d7da; padding: 3px 12px; border-radius: 20px; font-weight: 600; font-size: 0.82rem; }
  .class-label { background: #1a3c5e; color: white; padding: 10px 18px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
  .summary { max-width: 700px; margin: 16px auto 0; display: flex; gap: 12px; }
  .summary-box { flex: 1; background: white; border-radius: 10px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .summary-box .num { font-size: 1.8rem; font-weight: 800; }
  .summary-box .label { font-size: 0.8rem; color: #888; margin-top: 4px; }
  .green { color: #27ae60; }
  .red   { color: #c0392b; }
  .blue  { color: #2980b9; }
</style>
</head>
<body>
<h1>📊 Student Result Table</h1>
<p class="sub">CSC101 · CSC102 · CSC103 &nbsp;|&nbsp; Pass mark: 50</p>

<div class="table-wrap" id="tableWrap"></div>

<div class="summary" id="summary"></div>

<script>
// ── THE EXACT JSON STRING FROM THE ASSIGNMENT ───────────
const jsonString = '{"classA":[{"name":"Amara","CSC101":72,"CSC102":55,"CSC103":68},{"name":"Chidi","CSC101":40,"CSC102":48,"CSC103":35},{"name":"Ngozi","CSC101":85,"CSC102":90,"CSC103":78},{"name":"Emeka","CSC101":60,"CSC102":52,"CSC103":44}],"classB":[{"name":"Fatima","CSC101":91,"CSC102":88,"CSC103":95},{"name":"Tunde","CSC101":30,"CSC102":45,"CSC103":50},{"name":"Blessing","CSC101":77,"CSC102":63,"CSC103":70},{"name":"Seun","CSC101":55,"CSC102":49,"CSC103":58}]}';

// ── PARSE THE JSON ──────────────────────────────────────
const schoolData = JSON.parse(jsonString);

// ── COMPUTE AVERAGES ─────────────────────────────────────
const PASS_MARK  = 50;
const subjects   = ["CSC101", "CSC102", "CSC103"];

let allStudents = [];

// Loop through both classes
for (const className in schoolData) {
  const classStudents = schoolData[className];

  classStudents.forEach(student => {
    // Compute average across 3 subjects
    const total   = subjects.reduce((sum, sub) => sum + student[sub], 0);
    const average = total / subjects.length;
    const status  = average >= PASS_MARK ? "Pass" : "Fail";

    allStudents.push({
      name:      student.name,
      className: className,
      average:   average.toFixed(1),
      status
    });
  });
}

// ── RENDER TABLE ─────────────────────────────────────────
function buildTable() {
  const wrap = document.getElementById("tableWrap");
  let html   = `<table>
    <thead>
      <tr><th>#</th><th>Name</th><th>Class</th><th>Average</th><th>Status</th></tr>
    </thead>
    <tbody>`;

  allStudents.forEach((s, i) => {
    html += `<tr>
      <td>${i + 1}</td>
      <td>${s.name}</td>
      <td>${s.className}</td>
      <td>${s.average}</td>
      <td><span class="${s.status.toLowerCase()}">${s.status}</span></td>
    </tr>`;
  });

  html += `</tbody></table>`;
  wrap.innerHTML = html;
}

// ── SUMMARY STATS ─────────────────────────────────────────
function buildSummary() {
  const passed = allStudents.filter(s => s.status === "Pass").length;
  const failed = allStudents.filter(s => s.status === "Fail").length;
  const avgAll = (allStudents.reduce((sum, s) => sum + parseFloat(s.average), 0) / allStudents.length).toFixed(1);

  document.getElementById("summary").innerHTML = `
    <div class="summary-box"><div class="num blue">${allStudents.length}</div><div class="label">Total Students</div></div>
    <div class="summary-box"><div class="num green">${passed}</div><div class="label">Passed</div></div>
    <div class="summary-box"><div class="num red">${failed}</div><div class="label">Failed</div></div>
    <div class="summary-box"><div class="num blue">${avgAll}</div><div class="label">Class Average</div></div>
  `;
}

buildTable();
buildSummary();
</script>
</body>
</html>
